# 去 AI 味规则引擎（合并 去AI味写作指南 + review_passes ai_cliche_db）
target_score: 30

# 文风硬指标（扫描 + 写作 prompt 共用）
style_limits:
  em_dash_max_per_500: 1
  long_sentence_chars: 30
  long_sentence_max_ratio: 0.10

# 成稿节奏（写作 prompt 与扫描共用）
writing_rhythm:
  max_sentence_chars: 45
  max_paragraph_chars: 220
  max_sentences_per_paragraph: 4
  parallel_tricolon_max_per_1000: 1
  semantic_similarity_threshold: 0.52
  semantic_similar_max_per_1000: 1
  semantic_compare_window: 6

banned_phrases:
  - pattern: "你需要先理解一个根本性的矛盾"
    suggestion: "直接陈述矛盾"
  - pattern: "对于缺乏.+的读者"
    suggestion: "删掉标签，用案例说明"
  - pattern: "这就是.+的价值所在"
    suggestion: "删掉，让前文自己说明"
  - pattern: "做完了你就懂了"
    suggestion: "删掉"
  - pattern: "你不是在与AI竞争"
    suggestion: "删掉"
  - pattern: "本质上"
    suggestion: "其实就是 / 说白了就是"
  - pattern: "最核心的|最关键的|至关重要|不可或缺"
    suggestion: "用具体数据或案例"
  - pattern: "尤其值得关注|不可忽视|值得注意"
    suggestion: "直接说内容"
  - pattern: "不难理解|不难发现|显而易见|毋庸置疑"
    suggestion: "直接陈述结论"
  - pattern: "远不止于此|远不止于"
    suggestion: "直接说还有什么"
  - pattern: "直接决定了"
    suggestion: "影响了 / 决定了"
  - pattern: "综上所述|总而言之|归根结底"
    suggestion: "直接给结论"
  - pattern: "值得注意的是|需要指出的是|不可否认"
    suggestion: "直接说事"
  - pattern: "这标志着|这预示着|开启了新纪元"
    suggestion: "用具体事实"
  - pattern: "具有重要意义|发挥着重要作用|具有深远影响"
    suggestion: "用数据或案例"

cliche_categories:
  opening:
    - 在当今
    - 随着
    - 近年来
    - 众所周知
    - 在互联网时代
    - 在数字化浪潮中
    - 在AI技术飞速发展的今天
    - 在全球化背景下
    - 在新时代
    - 在这个快速变化的时代
  transition:
    - 值得注意的是
    - 需要指出的是
    - 不得不说
    - 综上所述
    - 总而言之
    - 通过以上分析
    - 从上述内容可以看出
    - 总的来说
    - 综合来看
  written:
    - 显著提升
    - 充分利用
    - 有效改善
    - 深入了解
    - 经过深入分析
    - 大幅度提高
    - 极大地改善
    - 明显优化
  ai_pattern:
    - 不仅
    - 而且
    - 通过
    - 实现
    - 基于
    - 具有
    - 特点

replace_map:
  然而: 但
  当然: ""
  总而言之: ""
  综上所述: ""
  值得一提的是: ""
  delve: ""
  utilize: 用
  leverage: 用
