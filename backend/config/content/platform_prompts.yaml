# 平台派生 Prompt（参考 content-agent templates.py）
writing_principles: |
  【写作原则】
  1. 内容准确：数据事实来自母稿，禁止编造
  2. 信息密度高：每段有具体信息（数据、案例、产品名）
  3. 具体胜过抽象
  4. 有态度有观点
  5. 禁止：本文介绍、众所周知、随着XX的发展、让我们一起来看

platforms:
  wechat:
    label: 公众号
    word_range: [1500, 2500]
    prompt: |
      将以下母稿改写为公众号推文。保留核心观点与数据。
      - 第一行 # 标题（50字内，关键词前置，禁「震惊/万字长文/深度好文」）
      - 标题下 > 一句话核心观点
      - ## 分2-4个小节，标题要有信息量
      - **加粗**关键结论和数据
      - 结尾独立判断+评论引导问句
      字数1500-2500。直接输出 Markdown，不要解释。

  xiaohongshu:
    label: 小红书
    word_range: [400, 600]
    prompt: |
      将以下母稿改写为小红书笔记。
      - 标题：emoji+口语化，25字内
      - 开门见山第一句给结论
      - 3-5个要点，每点具体（功能/效果/数字）
      - 一句真实感受+互动问题
      - 结尾6-8个 #标签
      字数400-600。直接输出 Markdown。

  zhihu:
    label: 知乎
    word_range: [1000, 2000]
    prompt: |
      将以下母稿改写为知乎文章。
      - 标题有观点锋芒，关键词前置
      - > blockquote 亮核心观点
      - ## 2-4小节，论据支撑，可反驳常见误解
      - 理性克制，有锋芒不情绪化
      字数1000-2000。直接输出 Markdown。

  voice:
    label: 口播稿
    word_range: [600, 900]
    prompt: |
      将以下母稿改写为口播脚本。
      - 开场3句内抓住注意力
      - 口语化短句，标注 [停顿]
      - 约3-5分钟（600-900字）
      - 结尾行动号召
      直接输出口播稿。
